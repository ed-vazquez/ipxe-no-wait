name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  source:
    name: Clone source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone iPXE source
        run: |
          IPXE_VERSION=$(grep -oP 'IPXE_VERSION=\K\S+' Dockerfile)
          ./scripts/clone.sh ${IPXE_VERSION} config ipxe-src

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-source
          path: ipxe-src/

  build:
    name: Build / ${{ matrix.arch }}
    needs: source
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
          - arm32
          - arm64
    container:
      image: ghcr.io/ipxe/ipxe-builder-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: ipxe-source
          path: ipxe-src/

      - name: Restore script permissions
        run: |
          find ipxe-src/src/util -type f -exec chmod +x {} +
          find ipxe-src/src -name 'Makefile*' -exec chmod +r {} +

      - name: Build
        run: ./scripts/build.sh ${{ matrix.arch }} ipxe-src output

      - name: Collect binaries
        run: |
          mkdir -p binaries
          find ipxe-src/src/bin* \
            -name '*.efi' -o -name '*.pxe' -o -name '*.kpxe' \
            -o -name '*.lkrn' | while read f; do
              dir="binaries/$(dirname "${f#ipxe-src/src/}")"
              mkdir -p "${dir}"
              cp "${f}" "${dir}/"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: binaries/

  package:
    name: Package
    needs: [source, build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ipxe/ipxe-builder-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: ipxe-source
          path: ipxe-src/

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: artifacts/

      - name: Merge build artifacts
        run: |
          cp -r artifacts/build-x86_64/* ipxe-src/src/
          cp -r artifacts/build-arm32/* ipxe-src/src/
          cp -r artifacts/build-arm64/* ipxe-src/src/

      - name: Restore script permissions
        run: chmod +x ipxe-src/src/util/gen*

      - name: Package
        run: ./scripts/package.sh ipxe-src output

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-release
          path: output/

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ipxe-release
          path: output/

      - name: Generate release notes
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          ./scripts/release-notes.sh "${{ github.ref_name }}" "${REPO_URL}" release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            output/ipxe-x86_64.iso
            output/ipxe-x86_64.usb
            output/ipxeboot.tar.gz

  copr:
    name: Publish to COPR
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger COPR build
        env:
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
        if: env.COPR_WEBHOOK_URL != ''
        run: curl -X POST "${COPR_WEBHOOK_URL}"

  ppa:
    name: Publish to PPA
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.PPA_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y devscripts debhelper dput

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "${GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Build and upload source package
        run: |
          VERSION=$(dpkg-parsechangelog -S Version | cut -d- -f1)
          SERIES=(noble jammy)
          GPG_KEY="166A7D4BDCCF0B55CBF37E577C9346672B6ABD7D"

          for series in "${SERIES[@]}"; do
            sed -i "1s/)[^)]*$/~${series}) ${series}; urgency=medium/" debian/changelog
            debuild -S -sa -d -k${GPG_KEY}
            dput ppa:ed-vazquez/ipxe-no-wait ../ipxe-no-wait_*~${series}_source.changes
            git checkout debian/changelog
          done
