name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            liblzma-dev \
            isolinux \
            mtools \
            genisoimage

      - name: Clone iPXE source
        run: |
          IPXE_VERSION=$(grep -oP 'IPXE_VERSION=\K\S+' Dockerfile)
          git clone --depth 1 --branch ${IPXE_VERSION} https://github.com/ipxe/ipxe.git ipxe-src

      - name: Apply config overrides and build
        working-directory: ipxe-src/src
        run: |
          cp -r ../../config/ config/local/
          make -j$(nproc) bin-x86_64-efi/snponly.efi bin/undionly.kpxe

      - name: Collect artifacts
        run: |
          mkdir -p output
          cp ipxe-src/src/bin-x86_64-efi/snponly.efi output/ipxe-snponly-x86_64.efi
          cp ipxe-src/src/bin/undionly.kpxe output/undionly.kpxe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-binaries
          path: output/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipxe-binaries
          path: output/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/ipxe-snponly-x86_64.efi
            output/undionly.kpxe
          generate_release_notes: true
