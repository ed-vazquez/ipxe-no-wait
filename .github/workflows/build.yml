name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-9 \
            libc6-dev \
            make \
            liblzma-dev \
            isolinux \
            mtools \
            genisoimage

      - name: Clone iPXE source
        run: |
          IPXE_VERSION=$(grep -oP 'IPXE_VERSION=\K\S+' Dockerfile)
          git clone --depth 1 --branch ${IPXE_VERSION} https://github.com/ipxe/ipxe.git ipxe-src

      - name: Apply config overrides
        run: cp -r config/ ipxe-src/src/config/local/

      - name: Build BIOS (i386)
        working-directory: ipxe-src/src
        run: |
          make -j$(nproc) CC=gcc-9 \
            bin/ipxe.pxe \
            bin/ipxe-legacy.pxe \
            bin/undionly.kpxe \
            bin/ipxe.lkrn

      - name: Build BIOS (x86_64)
        working-directory: ipxe-src/src
        run: |
          make -j$(nproc) CC=gcc-9 \
            bin-x86_64-pcbios/ipxe.pxe \
            bin-x86_64-pcbios/ipxe-legacy.pxe \
            bin-x86_64-pcbios/undionly.kpxe \
            bin-x86_64-pcbios/ipxe.lkrn

      - name: Build EFI (x86_64)
        working-directory: ipxe-src/src
        run: |
          make -j$(nproc) CC=gcc-9 \
            bin-x86_64-efi/ipxe.efi \
            bin-x86_64-efi/ipxe-legacy.efi \
            bin-x86_64-efi/snponly.efi

      - name: Generate server tarball
        working-directory: ipxe-src/src
        run: |
          ./util/gensrvimg -o ../../ipxeboot.tar.gz \
            bin/ipxe.pxe \
            bin/ipxe-legacy.pxe \
            bin/undionly.kpxe \
            bin-x86_64-pcbios/ipxe.pxe \
            bin-x86_64-pcbios/ipxe-legacy.pxe \
            bin-x86_64-pcbios/undionly.kpxe \
            bin-x86_64-efi/ipxe.efi \
            bin-x86_64-efi/ipxe-legacy.efi \
            bin-x86_64-efi/snponly.efi

      - name: Generate ISO and USB images
        working-directory: ipxe-src/src
        run: |
          ./util/genfsimg -o ../../ipxe.iso \
            bin-x86_64-pcbios/ipxe.lkrn \
            bin-x86_64-efi/ipxe.efi
          ./util/genfsimg -o ../../ipxe.usb \
            bin-x86_64-pcbios/ipxe.lkrn \
            bin-x86_64-efi/ipxe.efi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipxe-binaries
          path: |
            ipxe.iso
            ipxe.usb
            ipxeboot.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ipxe-binaries
          path: output/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/ipxe.iso
            output/ipxe.usb
            output/ipxeboot.tar.gz
          generate_release_notes: true
